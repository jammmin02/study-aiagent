<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페르소나 챗봇 — Chapter 1 실습</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>페르소나 챗봇</h1>
            <p class="subtitle">System Prompt로 AI의 성격을 바꿔보세요</p>
        </header>

        <!-- 페르소나 선택 -->
        <div class="persona-selector">
            {% for id, persona in personas.items() %}
            <button class="persona-btn" data-persona="{{ id }}" onclick="selectPersona('{{ id }}')">
                <strong>{{ persona.name }}</strong>
                <span>{{ persona.description }}</span>
            </button>
            {% endfor %}
        </div>

        <!-- 채팅 영역 -->
        <div id="chat-area" class="chat-area">
            <div id="messages" class="messages">
                <div class="system-msg">페르소나를 선택하면 대화가 시작됩니다.</div>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." disabled
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()" disabled>전송</button>
            <button id="reset-btn" onclick="resetChat()" disabled>초기화</button>
        </div>

        <!-- 토큰 사용량 -->
        <div id="token-info" class="token-info"></div>
    </div>

    <script>
        let currentPersona = null;
        const sessionId = crypto.randomUUID();

        function selectPersona(personaId) {
            currentPersona = personaId;

            // 버튼 활성화 상태 변경
            document.querySelectorAll('.persona-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.persona === personaId);
            });

            // 입력 활성화
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('reset-btn').disabled = false;

            // 대화 초기화
            resetChat();

            const messages = document.getElementById('messages');
            messages.innerHTML = `<div class="system-msg">
                <strong>${document.querySelector(`[data-persona="${personaId}"]`).querySelector('strong').textContent}</strong>
                페르소나로 대화를 시작합니다.
            </div>`;

            document.getElementById('user-input').focus();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message || !currentPersona) return;

            // 사용자 메시지 표시
            appendMessage('user', message);
            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;

            // AI 응답 영역 생성
            const assistantDiv = appendMessage('assistant', '');

            try {
                // SSE로 스트리밍 수신
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        persona: currentPersona,
                        message: message,
                        session_id: sessionId,
                    }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 아직 완성되지 않은 마지막 줄 보관

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.text) {
                            assistantDiv.querySelector('.text').textContent += data.text;
                            scrollToBottom();
                        }
                        if (data.done) {
                            document.getElementById('token-info').textContent =
                                `토큰 사용량 — 입력: ${data.input_tokens} / 출력: ${data.output_tokens}`;
                        }
                    }
                }
            } catch (error) {
                assistantDiv.querySelector('.text').textContent = '[오류] 응답을 받지 못했습니다.';
            }

            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        function appendMessage(role, text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <span class="role">${role === 'user' ? '나' : 'AI'}</span>
                <span class="text">${text}</span>
            `;
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chat-area');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function resetChat() {
            if (!currentPersona) return;
            await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ persona: currentPersona, session_id: sessionId }),
            });
            document.getElementById('token-info').textContent = '';
        }
    </script>
</body>
</html>
