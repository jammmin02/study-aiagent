<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 관리 Agent — Chapter 4 실습</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>일정 관리 Agent</h1>
            <p class="subtitle">MCP 서버로 분리된 도구를 활용하는 Agent</p>
        </header>

        <!-- 사용 가능한 도구 -->
        <div class="tool-list">
            {% for name, info in tool_info.items() %}
            <span class="tool-badge">{{ info.icon }} {{ info.label }}</span>
            {% endfor %}
        </div>

        <!-- 채팅 영역 -->
        <div id="chat-area" class="chat-area">
            <div id="messages" class="messages">
                <div class="system-msg">
                    MCP 서버의 도구로 일정을 관리합니다.<br>
                    "내일 3시에 팀 미팅 추가해줘", "이번 주 일정 보여줘" 등을 시도해보세요.
                </div>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..."
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">전송</button>
            <button id="reset-btn" onclick="resetChat()">초기화</button>
        </div>

        <div id="token-info" class="token-info"></div>
    </div>

    <script>
        const sessionId = crypto.randomUUID();

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;

            const assistantDiv = appendMessage('assistant', '');
            const textSpan = assistantDiv.querySelector('.text');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.tool_call) {
                            const tc = data.tool_call;
                            const toolDiv = document.createElement('div');
                            toolDiv.className = 'tool-step tool-calling';
                            toolDiv.innerHTML = `
                                <span class="tool-icon">${tc.icon}</span>
                                <span class="tool-label">${tc.label}</span>
                                <span class="tool-input">${JSON.stringify(tc.input)}</span>
                                <span class="tool-status">호출 중...</span>
                            `;
                            textSpan.before(toolDiv);
                            scrollToBottom();
                        }

                        if (data.tool_result) {
                            const toolDivs = assistantDiv.querySelectorAll('.tool-step.tool-calling');
                            const lastTool = toolDivs[toolDivs.length - 1];
                            if (lastTool) {
                                lastTool.classList.remove('tool-calling');
                                lastTool.classList.add(data.tool_result.is_error ? 'tool-error' : 'tool-success');
                                lastTool.querySelector('.tool-status').textContent =
                                    data.tool_result.is_error ? '실패' : '완료';
                            }
                            scrollToBottom();
                        }

                        if (data.text) {
                            textSpan.textContent += data.text;
                            scrollToBottom();
                        }

                        if (data.done) {
                            document.getElementById('token-info').textContent =
                                `토큰 사용량 — 입력: ${data.input_tokens} / 출력: ${data.output_tokens}`;
                        }
                    }
                }
            } catch (error) {
                textSpan.textContent = '[오류] 응답을 받지 못했습니다.';
            }

            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        function appendMessage(role, text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <span class="role">${role === 'user' ? '나' : 'Agent'}</span>
                <span class="text">${text}</span>
            `;
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chat-area');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function resetChat() {
            await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId }),
            });
            document.getElementById('messages').innerHTML =
                '<div class="system-msg">대화가 초기화되었습니다.</div>';
            document.getElementById('token-info').textContent = '';
        }
    </script>
</body>
</html>
